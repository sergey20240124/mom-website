    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <div class="lightbox-content" id="lightboxContent" onclick="event.stopPropagation()">
            <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        </div>
    </div>

    <script>
        const items = [            { type: 'img', src: '20260627/tg_7463049252_419.jpg', alt: 'Family moment 1' },            { type: 'img', src: '20260627/tg_7463049252_420.jpg', alt: 'Family moment 2' },            { type: 'img', src: '20260627/tg_7463049252_421.jpg', alt: 'Family moment 3' },            { type: 'img', src: '20260627/tg_7463049252_422.jpg', alt: 'Family moment 4' },            { type: 'img', src: '20260627/tg_7463049252_423.jpg', alt: 'Family moment 5' },            { type: 'img', src: '20260627/tg_7463049252_424.jpg', alt: 'Family moment 6' },            { type: 'img', src: '20260627/tg_7463049252_425.jpg', alt: 'Family moment 7' },            { type: 'video', src: '20260627/tg_7463049252_426.mp4', alt: 'Family video 8' },            { type: 'img', src: '20260627/tg_7463049252_427.jpg', alt: 'Family moment 9' },            { type: 'img', src: '20260627/tg_7463049252_428.jpg', alt: 'Family moment 10' },            { type: 'img', src: '20260627/tg_7463049252_429.jpg', alt: 'Family moment 11' }];

        function openLightbox(index) {
            const lightbox = document.getElementById('lightbox');
            const content = document.getElementById('lightboxContent');
            const item = items[index];
            let html = '<span class="lightbox-close" onclick="closeLightbox()">&times;</span>';
            if (item.type === 'img') {
                html += `<img src="${item.src}" alt="${item.alt}" style="max-width: 600px; max-height: 800px; object-fit: contain;">`;
            } else if (item.type === 'video') {
                html += `<video controls autoplay style="max-width: 600px; max-height: 800px; object-fit: contain;"><source src="${item.src}" type="video/mp4"></video>`;
            }
            content.innerHTML = html;
            lightbox.classList.add('active');
        }

        function closeLightbox(event) {
            if (event && event.target && event.target.id !== 'lightbox') return;
            document.getElementById('lightbox').classList.remove('active');
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeLightbox();
        });
    </script>
